name: Auto-Update Monaco

on:
  schedule:
  - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch:
    # Allow manual trigger

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Need full history for tag lookup

    - name: Get current Monaco version from latest tag
      id: current
      run: |
        # Find the latest tag matching the pattern X.Y.Z+monaco.A.B.C
        TAG=$(git tag --list --sort=-v:refname | grep '+monaco\.' | head -n 1)

        if [ -z "$TAG" ]; then
          echo "No existing tag with +monaco. metadata found."
          echo "monaco_version=0.0.0" >> "$GITHUB_OUTPUT"
          echo "pkg_version=0.0.0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Latest tag: $TAG"

        # Parse: 0.3.0+monaco.0.55.1 → pkg=0.3.0, monaco=0.55.1
        PKG_VERSION="${TAG%%+*}"
        MONACO_VERSION="${TAG##*+monaco.}"

        echo "Package version: $PKG_VERSION"
        echo "Monaco version:  $MONACO_VERSION"

        echo "monaco_version=$MONACO_VERSION" >> "$GITHUB_OUTPUT"
        echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

    - name: Get latest Monaco version from npm
      id: latest
      run: |
        LATEST=$(curl -s https://registry.npmjs.org/monaco-editor/latest | jq -r '.version')
        echo "Latest Monaco on npm: $LATEST"
        echo "monaco_version=$LATEST" >> "$GITHUB_OUTPUT"

    - name: Compare versions
      id: compare
      run: |
        CURRENT="${{ steps.current.outputs.monaco_version }}"
        LATEST="${{ steps.latest.outputs.monaco_version }}"

        echo "Current: $CURRENT"
        echo "Latest:  $LATEST"

        # Sort versions and check if latest comes after current
        if [ "$(printf '%s\n%s' "$CURRENT" "$LATEST" | sort -V | tail -n1)" != "$CURRENT" ]; then
          echo "Update available!"
          echo "needs_update=true" >> "$GITHUB_OUTPUT"
        else
          echo "Already up to date."
          echo "needs_update=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Update version in .csproj
      if: steps.compare.outputs.needs_update == 'true'
      id: new_version
      run: |
        NEW_VERSION="${{ steps.current.outputs.pkg_version }}+monaco.${{ steps.latest.outputs.monaco_version }}"
        echo "New version: $NEW_VERSION"

        CSPROJ="src/MonacoEditor.WinUI3/MonacoEditor.WinUI3.csproj"
        sed -i "s|<Version>.*</Version>|<Version>$NEW_VERSION</Version>|" "$CSPROJ"

        echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

    - name: Commit version bump
      if: steps.compare.outputs.needs_update == 'true'
      id: commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/MonacoEditor.WinUI3/MonacoEditor.WinUI3.csproj
        git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}"
        git push
        echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Create release
      if: steps.compare.outputs.needs_update == 'true'
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        name: ${{ steps.new_version.outputs.version }}
        tag: ${{ steps.new_version.outputs.version }}
        commit: ${{ steps.commit.outputs.sha }}
        body: |
          # Monaco Editor Update (to `${{ steps.latest.outputs.monaco_version }}`)

          Automated update of the bundled Monaco Editor.

          **Previous Monaco version:** `${{ steps.current.outputs.monaco_version }}`
          **New Monaco version:** `${{ steps.latest.outputs.monaco_version }}`

          The package version was updated to `${{ steps.new_version.outputs.version }}`.
