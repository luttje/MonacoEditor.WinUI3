name: Pack & Publish

on:
  release:
    types: [ published ]

jobs:
  pack:
    runs-on: windows-latest
    permissions:
      id-token: write # For OIDC NuGet login

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Extract Monaco version from release tag
      id: monaco
      shell: pwsh
      run: |
        $tag = "${{ github.event.release.tag_name }}"
        if ($tag -match '-monaco\.(?<monaco>.+)$') {
          $monacoVersion = $Matches['monaco']
        } else {
          Write-Error "Release tag '$tag' doesn't contain -monaco. pre-release version."
          exit 1
        }
        Write-Host "Monaco version: $monacoVersion"
        echo "version=$monacoVersion" >> $env:GITHUB_OUTPUT

    - name: Update Monaco
      shell: pwsh
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
        .\scripts\Update-Monaco.ps1 -Version "${{ steps.monaco.outputs.version }}"

    - name: Pack NuGet
      run: dotnet pack src/MonacoEditor.WinUI3/MonacoEditor.WinUI3.csproj -c Release -o ./artifacts

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: luttje

    - name: NuGet push
      shell: pwsh
      run: |
        foreach ($pkg in Get-Item ./artifacts/*.nupkg) {
          dotnet nuget push $pkg.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
